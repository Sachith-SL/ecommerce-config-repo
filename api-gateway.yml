server:
  port: 8080

spring:
  application:
    name: api-gateway
  
  data:
    redis:
      host: localhost
      port: 6379


  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      
      routes:
        - id: order-service
          uri: lb://order-service
          predicates:
            - Path=/api/scn/v1/order/**
          filters:
            - name: RequestRateLimiter
              args:
                key-resolver: "#{@userKeyResolver}"
                redis-rate-limiter.replenishRate: 5
                redis-rate-limiter.burstCapacity: 10
        

